<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bernice Bai ┃ Designer</title>
    <link rel="icon" href="imgsrc/cursor.svg" type="image/svg+xml">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; cursor: none; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: #111111;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 0 5%;
        }

        #custom-cursor {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
        }

        #cursor-default {
            display: block;
            width: 20px;
            height: 20px;
            background-image: url('imgsrc/cursor.svg');
            background-size: contain;
            background-repeat: no-repeat;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 0;
            border-bottom: 0.5px solid #eeeeee;
        }

        #logo img { width: 40px; height: auto; }

        .nav-right {
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #999999;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 80px 0 40px;
        }

        .label {
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #999999;
            margin-bottom: 24px;
        }

        h1 {
            font-family: 'Lora', san-serif;
            font-size: clamp(32px, 6vw, 64px);
            font-weight: 400;
            line-height: 1.1;
            letter-spacing: -0.02em;
            margin-bottom: 24px;
        }

        h1 em { font-style: bold; }

        .accent { color: #002e2d; }

        p {
            font-size: 15px;
            font-weight: 300;
            color: #666666;
            line-height: 1.7;
            max-width: 480px;
            margin-bottom: 40px;
        }

        .links {
            display: flex;
            gap: 24px;
        }

        .links a {
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #111111;
            text-decoration: none;
            border-bottom: 0.5px solid #111111;
            padding-bottom: 2px;
        }

        .links a:hover { color: #002e2d; border-color: #ffffff; }

        footer {
            padding: 24px 0;
            border-top: 0.5px solid #eeeeee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        footer p {
            font-size: 11px;
            color: #999999;
            margin: 0;
            max-width: none;
        }
    </style>
</head>

<body>

<div id="custom-cursor">
    <span id="cursor-default"></span>
</div>

<nav>
    <div id="logo">
        <img src="imgsrc/bfavicon.svg" alt="Logo">
    </div>
    <span class="nav-right">Coming Soon</span>
</nav>

<main>
    <p class="label">Portfolio — Under Construction</p>
    <h1>Something <em><span class="accent">thoughtful</span></em><br>is on its way.</h1>
    <p>I'm Bernice — a product designer rooted in art and technology. My portfolio is currently being built. In the meantime, feel free to reach out.</p>
    <div class="links">
        <a href="https://www.linkedin.com/in/bernice-bai-6373b129a/" target="_blank">LinkedIn</a>
        <a href="mailto:msenbai@gmail.com">Email</a>
        <a href="https://drive.google.com/file/d/17-NoSZiSDzahAH1HQ-_Etnf_DgS73Qhv/view?usp=drive_link" target="_blank">Resume</a>
    </div>
</main>

<footer>
    <p>&copy; <span id="year"></span> Bernice Bai</p>
    <p>Abuja, Nigeria</p>
</footer>

<script>
    document.getElementById('year').textContent = new Date().getFullYear();

    const cursor = document.getElementById('custom-cursor');
    document.addEventListener('mousemove', (e) => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
    });
</script>

</body>
</html>
